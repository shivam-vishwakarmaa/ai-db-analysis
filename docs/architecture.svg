<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .title { font: 700 22px 'Inter', system-ui, sans-serif; fill:#0f172a; }
      .label { font: 600 16px 'Inter', system-ui, sans-serif; fill:#0b132b; }
      .small { font: 13px 'Inter', system-ui, sans-serif; fill:#1f2937; }
      .note { font: 12px 'Inter', system-ui, sans-serif; fill:#475569; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="640" y="46" text-anchor="middle" class="title">PharmaGuard · End-to-End Flow</text>

  <!-- Stage boxes -->
  <g transform="translate(70,120)">
    <rect width="210" height="150" rx="16" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
    <text x="16" y="28" class="label">Stage 1 · Input & Parsing</text>
    <text x="16" y="56" class="small">User uploads VCF</text>
    <text x="16" y="76" class="small">Papaparse / validators</text>
    <text x="16" y="96" class="small">Client-side checks</text>
  </g>

  <g transform="translate(340,120)">
    <rect width="230" height="150" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
    <text x="16" y="28" class="label">Stage 2 · Ingestion</text>
    <text x="16" y="56" class="small">Normalize samples</text>
    <text x="16" y="76" class="small">Batch loading</text>
    <text x="16" y="96" class="small">Local storage cache</text>
  </g>

  <g transform="translate(630,120)">
    <rect width="210" height="150" rx="16" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="16" y="28" class="label">Stage 3 · Schema Analysis</text>
    <text x="16" y="56" class="small">Gene/variant mapping</text>
    <text x="16" y="76" class="small">Phenotype inference</text>
    <text x="16" y="96" class="small">Risk rules prep</text>
  </g>

  <g transform="translate(900,120)">
    <rect width="240" height="150" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="16" y="28" class="label">Stage 4 · AI Reasoning</text>
    <text x="16" y="56" class="small">Gemini API</text>
    <text x="16" y="76" class="small">Clinical narrative</text>
    <text x="16" y="96" class="small">Recommendations</text>
  </g>

  <g transform="translate(430,340)">
    <rect width="420" height="170" rx="18" fill="#e7f5e6" stroke="#16a34a" stroke-width="2"/>
    <text x="20" y="32" class="label">Stage 5 · Visualization & Reporting</text>
    <text x="20" y="62" class="small">Risk dashboard · drug tables · variant details</text>
    <text x="20" y="84" class="small">JSON export · copy-to-clipboard</text>
    <text x="20" y="106" class="small">Audit trail · session persistence</text>
  </g>

  <!-- Arrows -->
  <g stroke="#1f2937" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M280 195 H330"/>
    <path d="M570 195 H620"/>
    <path d="M840 195 H890"/>
    <path d="M1030 270 L640 410"/>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <!-- Key -->
  <rect x="60" y="360" width="280" height="150" rx="16" fill="#fff" stroke="#cbd5e1"/>
  <text x="80" y="386" class="label">Legend</text>
  <circle cx="90" cy="415" r="6" fill="#0ea5e9"/>
  <text x="110" y="420" class="small">Frontend (React)</text>
  <circle cx="90" cy="445" r="6" fill="#6366f1"/>
  <text x="110" y="450" class="small">Analysis (Python/FastAPI)</text>
  <circle cx="90" cy="475" r="6" fill="#f59e0b"/>
  <text x="110" y="480" class="small">Gemini AI calls</text>

  <text x="640" y="650" text-anchor="middle" class="note">
    All sensitive data remains local; only minimal structured context sent to Gemini for narrative generation.
  </text>
</svg>
